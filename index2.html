<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EMI Calculator</title>
  <style>
    body {
      font-family: Arial;
       background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;


      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>EMI Calculator</h2>

  <input type="number" id="loan" placeholder="Loan Amount (₹)">
  <input type="number" id="rate" placeholder="Interest Rate (%)">
  <input type="number" id="time" placeholder="Time (Years)">

  <button onclick="calculateEMI()">Calculate EMI</button>

  <div class="result" id="result"></div>
</div>

<script>
function calculateEMI() {
  let P = document.getElementById("loan").value;
  let annualRate = document.getElementById("rate").value;
  let years = document.getElementById("time").value;

  let R = annualRate / 12 / 100;
  let N = years * 12;

  let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

  if (EMI) {
    document.getElementById("result").innerHTML =
      "Monthly EMI: ₹" + EMI.toFixed(2);
  } else {
    document.getElementById("result").innerHTML =
      "Please enter valid values";
  }
}
</script>

</body>
</html>
