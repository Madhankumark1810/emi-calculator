<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EMI Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
 
 
  background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;


  }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>EMI Calculator</h2>

  <label>Loan Amount (₹)</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <label>Annual Interest Rate (%)</label>
  <input type="number" id="rate" placeholder="Enter interest rate">

  <label>Loan Tenure (Years)</label>
  <input type="number" id="years" placeholder="Enter years">

  <button onclick="calculateEMI()">Calculate EMI</button>

  <div class="result" id="result"></div>
</div>

<script>
  function calculateEMI() {
    let P = document.getElementById("amount").value;
    let annualRate =document.getElementById("rate").value;
    let years = document.getElementById("years").value;

    if (P === ""|| annualRate === "" || years === "") {
      document.getElementById("result").innerText = "Please fill all fields";
      return;
    }

    let r = annualRate/12 /100 ; 
    let n = years * 12; 

   let EMI = (P * r * n)/100;



    document.getElementById("result").innerText = "Monthly EMI: ₹ " + EMI;
  }
</script>

</body>
</html>
